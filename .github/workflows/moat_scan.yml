name: Moat Scanner

on:

  workflow_dispatch:

  schedule:
    - cron: "0 13 * * 1-5"

jobs:

  moat:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache moat data
        uses: actions/cache@v4
        with:
          path: moat_cache
          key: moat-cache-v1

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Run Scanner
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python app.py
